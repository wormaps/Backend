name: Blender Smoke Test

on:
  schedule:
    - cron: '0 6 * * *'  # 매일 06:00 UTC
  workflow_dispatch:      # 수동 실행 가능

jobs:
  blender-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build GLB
        run: |
          bun -e "
            import { createWorMapMvpApp } from './src/main';
            import { baselineFixtures } from './fixtures/phase2';
            import { writeFileSync } from 'node:fs';
            const app = createWorMapMvpApp();
            const results = await Promise.all(baselineFixtures.map(f => app.services.sceneBuildOrchestrator.run(f)));
            for (let i = 0; i < results.length; i++) {
              const r = results[i];
              if (r.kind === 'completed') {
                writeFileSync(\`/tmp/wormap-baseline-\${i}.glb\`, r.glbArtifact.bytes);
                console.log(\`Saved baseline-\${i}.glb (\${r.glbArtifact.byteLength} bytes)\`);
              }
            }
          "

      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Run Blender smoke test
        run: |
          for f in /tmp/wormap-baseline-*.glb; do
            echo "Testing: $f"
            blender --background --python test/scripts/blender-import-smoke.py -- "$f" || {
              echo "BLENDER SMOKE FAILED: $f"
              exit 1
            }
          done
          echo "All Blender smoke tests passed"
